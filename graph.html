        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {
                  item : '',

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#97c2fc", "id": 0, "label": "An American woman died aboard a cruise ship that docked at Rio de Janeiro on Tuesday, the same ship on which 86 passengers previously fell ill, according to the state-run Brazilian news agency, Agencia Brasil", "shape": "dot"}, {"color": "#97c2fc", "id": 1, "label": " The American tourist died aboard the MS Veendam, owned by cruise operator Holland America", "shape": "dot"}, {"color": "#97c2fc", "id": 2, "label": " Federal Police told Agencia Brasil that forensic doctors were investigating her death", "shape": "dot"}, {"color": "#97c2fc", "id": 3, "label": " The ship\u0027s doctors told police that the woman was elderly and suffered from diabetes and hypertension, according the agency", "shape": "dot"}, {"color": "#97c2fc", "id": 4, "label": " The other passengers came down with diarrhea prior to her death during an earlier part of the trip, the ship\u0027s doctors said", "shape": "dot"}, {"color": "#97c2fc", "id": 5, "label": " The Veendam left New York 36 days ago for a South America tour", "shape": "dot"}, {"color": "#97c2fc", "id": 6, "label": 6, "shape": "dot"}]);
                  edges = new vis.DataSet([{"from": 0, "to": 1, "value": 0.5480486154556274}, {"from": 0, "to": 2, "value": 0.3509799540042877}, {"from": 0, "to": 3, "value": 0.36736154556274414}, {"from": 0, "to": 4, "value": 0.5205034017562866}, {"from": 1, "to": 3, "value": 0.24155716598033905}, {"from": 1, "to": 4, "value": 0.40098026394844055}, {"from": 1, "to": 5, "value": 0.5442652702331543}, {"from": 2, "to": 3, "value": 0.28682440519332886}, {"from": 2, "to": 4, "value": 0.2312144935131073}, {"from": 3, "to": 4, "value": 0.34525442123413086}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {
    "configure": {
        "enabled": false
    },
    "edges": {
        "color": {
            "inherit": true
        },
        "smooth": {
            "enabled": true,
            "type": "dynamic"
        }
    },
    "interaction": {
        "dragNodes": true,
        "hideEdgesOnDrag": false,
        "hideNodesOnDrag": false
    },
    "physics": {
        "enabled": true,
        "stabilization": {
            "enabled": true,
            "fit": true,
            "iterations": 1000,
            "onlyDynamicEdges": false,
            "updateInterval": 50
        }
    }
};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
